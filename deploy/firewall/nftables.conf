#!/usr/sbin/nft -f
# PrivDNS Gateway 防火墙 —— 只用独立表 inet pdg, 不 flush 全局(不动 Docker/fail2ban/WireGuard 等其它表)。
# install.sh 渲染占位符:
#   __SSH_PORT__      SSH 端口 (跟 sshd 的 Port 一致, 否则一应用即锁死)
#   __SERVER_IP__     网关服务器 IPv4
#   __INTERNAL_CIDR__ 内网卡来源段
# 这是 default-drop 白名单, 面向"专用网关机": 对全网只留 SSH + DoT(853);
# 53/80/81/443/5228-5230/8445 仅放行内网卡来源。
# 853 对公网开放: Android 私密 DNS 在 Wi-Fi 下源 IP 不是内网段, 若 853 只放内网会显示
# 「私人 DNS 服务器无法访问」并导致整网 DNS 不可用。mosdns 只对内网段做 A 劫持, 公网查询不劫持。
# 数据面使用 mihomo TPROXY: 内网卡来源的 tcp/udp(排除 DoT 853 与本机 DNS 53)透明送入 127.0.0.1:7893。
# 5228-5230 = GMS/FCM 推送(mtalk)原生端口; TPROXY 已覆盖任意端口, 这里再放行是为直连入站/诊断兼容。
# 先 declare 再 delete: 只重建本表、不碰其它表, 故不用 `flush ruleset`。
table inet pdg
delete table inet pdg

table inet pdg {
    chain prerouting {
        type filter hook prerouting priority mangle; policy accept;
        iif "lo" accept
        meta mark 1 accept
        ip saddr __INTERNAL_CIDR__ meta l4proto { tcp, udp } th dport { 53, 853 } accept
        ip saddr __INTERNAL_CIDR__ ip daddr __SERVER_IP__ tcp dport { 81, 8445 } accept
        ip saddr __INTERNAL_CIDR__ meta l4proto { tcp, udp } tproxy ip to 127.0.0.1:7893 meta mark set 1
    }

    chain input {
        type filter hook input priority 0; policy drop;
        iif "lo" accept
        ct state established,related accept
        meta mark 1 accept
        tcp dport __SSH_PORT__ accept
        # Android 私密 DNS / 任意网络 DoT (不劫持公网来源, 见 mosdns main_sequence)
        tcp dport 853 accept
        ip saddr __INTERNAL_CIDR__ tcp dport { 53, 80, 81, 443, 5228-5230, 8445 } accept
        ip saddr __INTERNAL_CIDR__ udp dport { 53 } accept
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept
    }
}
