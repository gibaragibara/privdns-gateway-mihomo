#!/usr/sbin/nft -f
# PrivDNS Gateway 防火墙 —— 只用独立表 inet pdg, 不 flush 全局(不动 Docker/fail2ban/WireGuard 等其它表)。
# install.sh 渲染占位符:
#   __SSH_PORT__      SSH 端口 (跟 sshd 的 Port 一致, 否则一应用即锁死)
#   __INTERNAL_CIDR__ 内网卡来源段
# 这是 default-drop 白名单, 面向"专用网关机": 对全网只留 SSH; 53/80/81/443/853/8445 仅放行内网卡来源。
# 数据面使用 mihomo TPROXY: 内网卡来源的 tcp/udp(排除 DoT 853、本机 DNS 53、已有转发/服务端口)透明送入 127.0.0.1:7893。
# (与其它需要入站端口的服务共存时, 把其端口加进下面白名单。本机自身 DNS 走 lo 不受影响。)
# 先 declare 再 delete: 只重建本表、不碰其它表, 故不用 `flush ruleset`。
table inet pdg
delete table inet pdg

table inet pdg {
    chain prerouting {
        type filter hook prerouting priority mangle; policy accept;
        meta mark 1 accept
        # KFC 上已有的 xray / nft DNAT 转发端口必须先放过, 否则会在 DNAT 前被 TPROXY 截进 mihomo。
        ip saddr __INTERNAL_CIDR__ meta l4proto { tcp, udp } th dport { 53, 853, 58957, 58959, 58960 } accept
        ip saddr __INTERNAL_CIDR__ meta l4proto { tcp, udp } tproxy ip to 127.0.0.1:7893 meta mark set 1
    }

    chain input {
        type filter hook input priority 0; policy drop;
        iif "lo" accept
        ct state established,related accept
        meta mark 1 accept
        tcp dport { __SSH_PORT__, 9999 } accept
        ip saddr __INTERNAL_CIDR__ tcp dport { 53, 80, 81, 443, 853, 8445, 58957, 58959, 58960 } accept
        ip saddr __INTERNAL_CIDR__ udp dport { 53, 58957, 58959, 58960 } accept
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept
    }
}

include "/etc/nftables.d/ss-relay.nft"
